quarkus.banner.path=explorviz-banner.txt

##########
## HTTP ##
##########

quarkus.http.port=8085
quarkus.http.test-port=8086
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200,http://localhost:8080,https://demo.explorviz.uni-kiel.de,https://explorviz.sustainkieker.kieker-monitoring.net
quarkus.http.cors.methods=GET,PUT,POST,DELETE
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

%dev.quarkus.http.host=0.0.0.0
%dev.quarkus.http.cors.origins=/.*/

##########
## gRPC ##
##########

quarkus.grpc.server.port=9000
quarkus.grpc.server.use-separate-server=true
quarkus.grpc.server.max-inbound-message-size=67108864
# Large repositories (e.g. Linux kernel) can block worker threads for several minutes.
quarkus.vertx.max-worker-execute-time=${VERTX_MAX_WORKER_EXECUTE_TIME:10m}

explorviz.landscape.file-data-insert-chunk-size=${FILE_DATA_INSERT_CHUNK_SIZE:500}
explorviz.landscape.commit-file-revision-cache-max-commits=${COMMIT_FILE_REVISION_CACHE_MAX_COMMITS:512}
explorviz.landscape.commit-file-revision-cache-max-files-per-commit=${COMMIT_FILE_REVISION_CACHE_MAX_FILES_PER_COMMIT:200000}
explorviz.landscape.parent-commit-lookup.max-attempts=${PARENT_COMMIT_LOOKUP_MAX_ATTEMPTS:5}
explorviz.landscape.parent-commit-lookup.retry-delay-ms=${PARENT_COMMIT_LOOKUP_RETRY_DELAY_MS:20}
explorviz.landscape.parent-commit-lookup.required-max-attempts=${PARENT_COMMIT_LOOKUP_REQUIRED_MAX_ATTEMPTS:50}
explorviz.landscape.parent-commit-lookup.required-retry-delay-ms=${PARENT_COMMIT_LOOKUP_REQUIRED_RETRY_DELAY_MS:100}
%test.explorviz.landscape.parent-commit-lookup.required-max-attempts=5
%test.explorviz.landscape.parent-commit-lookup.required-retry-delay-ms=20

###########
## Kafka ##
###########

quarkus.kafka.devservices.enabled=false

kafka.bootstrap.servers=kafka:9092
%dev.kafka.bootstrap.servers=localhost:9091
%test.kafka.bootstrap.servers=localhost:9091

mp.messaging.incoming.spans-parsed.connector=smallrye-kafka
mp.messaging.incoming.spans-parsed.topic=telemetry.spans.parsed
mp.messaging.incoming.spans-parsed.value.deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
mp.messaging.incoming.spans-parsed.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.spans-parsed.auto.offset.reset=earliest

%test.mp.messaging.incoming.spans-parsed.connector=smallrye-in-memory
%test.mp.messaging.incoming.spans-parsed.enabled=false

%ci.mp.messaging.incoming.spans-parsed.connector=smallrye-in-memory
%ci.mp.messaging.incoming.spans-parsed.enabled=false

mp.messaging.incoming.token-events.connector=smallrye-kafka
mp.messaging.incoming.token-events.topic=tokens.events
mp.messaging.incoming.token-events.group.id=landscape-service
mp.messaging.incoming.token-events.value.deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
mp.messaging.incoming.token-events.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.token-events.auto.offset.reset=earliest

%test.mp.messaging.incoming.token-events.connector=smallrye-in-memory
%ci.mp.messaging.incoming.token-events.connector=smallrye-in-memory

###########
## Neo4j ##
###########

quarkus.neo4j.pool.max-connection-pool-size=5000
quarkus.neo4j.authentication.disabled=true
quarkus.neo4j.devservices.image-name=neo4j:2026.03.1
quarkus.neo4j.devservices.bolt-port=7687
quarkus.neo4j.devservices.http-port=7474
quarkus.neo4j.devservices.additional-env.NEO4J_AUTH=none
quarkus.neo4j.devservices.additional-env.NEO4J_db_query_default__language=CYPHER_25
quarkus.neo4j.devservices.additional-env.NEO4J_PLUGINS=["apoc", "apoc-extended"]
quarkus.neo4j.devservices.additional-env.NEO4J_dbms_usage__report_enabled=false

%test.quarkus.http.test-port=18086
%test.quarkus.grpc.server.test-port=19001
%test.quarkus.grpc.server.port=19000
%test.quarkus.neo4j.devservices.bolt-port=17687
%test.quarkus.neo4j.devservices.http-port=17474
%test.quarkus.neo4j.devservices.service-name=landscape-test
%test.quarkus.neo4j.devservices.additional-env.NEO4J_PLUGINS=["apoc", "apoc-extended"]
%test.quarkus.neo4j.devservices.additional-env.NEO4J_AUTH=none
%test.quarkus.neo4j.devservices.additional-env.NEO4J_db_query_default__language=CYPHER_25
%test.quarkus.neo4j.devservices.additional-env.NEO4J_dbms_usage__report_enabled=false

%prod.quarkus.neo4j.uri=${NEO4J_URI:bolt://neo4j:7687}

%ci.quarkus.neo4j.uri=${NEO4J_URI:bolt://neo4j:7687}
%ci.quarkus.neo4j.authentication.disabled=true
%ci.quarkus.neo4j.devservices.enabled=false

# Default: WARN, for verbose Cypher output use DEBUG
quarkus.log.category."org.neo4j.ogm".level=WARN

# Suppresses warnings about relationship labels not existing in the database.
# Since we generally query first before writing into the database, these produce a lot of clutter.
quarkus.log.category."org.neo4j.ogm.drivers.bolt.response.BoltResponse.unrecognized".level=ERROR

#####################
## Jib Image Build ##
#####################

quarkus.container-image.group=explorviz
quarkus.container-image.name=landscape-service
quarkus.container-image.tag=latest
quarkus.jib.base-jvm-image=eclipse-temurin:21.0.1_12-jdk-alpine@sha256:075f8207cbfecf7e509e2d93e2ffc36c097b52a8109a9bfd40326fa12bd5c438
