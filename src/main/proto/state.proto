syntax = "proto3";

option java_multiple_files = true;
option java_package = "net.explorviz.landscape.proto";
option java_outer_classname = "StateProto";

service StateDataService {
  rpc GetStateData (StateDataRequest) returns (StateData) {}
}

message StateDataRequest {
  string landscape_token = 1;
  string repository_name = 2;
  string branch_name = 3;

  // Application name -> root application path relative to repo root
  // Default example: { "foo_application": "" }
  map<string, string> application_paths = 4;

  // Remote clone URL of the repository (e.g. https://github.com/org/project.git)
  string repository_url = 5;

  // When true, only persist landscape metadata and skip the expensive lookup of the
  // latest fully persisted commit. Used for API-triggered analyses where filters may
  // differ and all requested commits should be analyzed.
  bool skip_latest_commit_lookup = 6;
}

message StateData {
  // Newest already persisted commit
  string commit_id = 1;
}
